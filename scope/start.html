<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nifty Scope - Sort your week | GetNifty</title>
<meta name="description" content="Walk through your week. Sort each task into one of four buckets. Get a real map of what should run itself, what should stay with you, and what should stop.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='24' fill='%2348b898'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #d5d9cf;
    --bg-2: #dee1d8;
    --panel: #f4f6ee;
    --panel-2: #ffffff;
    --ink: #1a1c1a;
    --ink-soft: #2b2e2b;
    --muted: #6b6f65;
    --muted-soft: #8b8f85;
    --line: #b8bcaf;
    --line-soft: #cfd3c8;
    --mint: #48b898;
    --mint-soft: #d4ede4;
    --sage-deep: #a9b19d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    height: 100%; overflow-x: hidden;
  }
  ::selection { background: var(--mint); color: #fff; }
  a { color: var(--ink); }

  /* Progress bar */
  .progress-outer {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(184,188,175,.5); z-index: 30;
  }
  .progress-bar {
    height: 100%; background: var(--mint);
    width: 0%; transition: width .4s cubic-bezier(.2,.7,.2,1);
  }

  header.topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: 22px 32px;
    display: flex; align-items: center; gap: 20px;
    background: linear-gradient(to bottom, rgba(213,217,207,.95) 0%, rgba(213,217,207,.7) 70%, transparent 100%);
  }
  .brand { display: flex; align-items: baseline; gap: 12px; text-decoration: none; color: var(--ink); }
  .brand .mark {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 22px; letter-spacing: -.02em;
    display: inline-flex; align-items: baseline; gap: 8px;
  }
  .brand .mark .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--mint); display: inline-block;
  }
  .brand .sub {
    color: var(--muted); font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: .1em;
  }
  .count {
    margin-left: auto; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: .06em;
    font-variant-numeric: tabular-nums;
  }
  .count .num { color: var(--ink); font-weight: 600; }
  .exit {
    color: var(--muted); font-size: 12.5px; text-decoration: none;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
  }
  .exit:hover { color: var(--ink); }

  /* Main stage */
  main.stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 120px 24px 140px;
  }
  .card {
    max-width: 760px; width: 100%; margin: 0 auto;
  }
  .card.enter { animation: enter .5s cubic-bezier(.2,.7,.2,1) both; }
  .card.exit { animation: exit .3s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes enter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes exit { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-14px); } }

  .qnum {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted); font-size: 12px; font-weight: 500;
    letter-spacing: .14em; margin-bottom: 26px; text-transform: uppercase;
  }
  .qnum .num { color: var(--muted); }
  .qnum .dot { color: var(--muted); }
  .qnum .req { color: var(--mint); }

  h1.q {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(34px, 5.4vw, 56px); line-height: 1.05; letter-spacing: -.02em;
    margin: 0 0 14px; color: var(--ink);
    max-width: 20ch;
  }
  h1.q em { font-style: italic; color: var(--ink); font-weight: 500; }
  .subtitle {
    color: var(--muted); font-size: 17px; margin: 0 0 36px;
    line-height: 1.55; max-width: 34ch;
  }

  /* Text inputs */
  .input-wrap { position: relative; }
  input.big, textarea.big {
    width: 100%; background: transparent;
    border: none; border-bottom: 1.5px solid var(--line);
    padding: 14px 0; font-size: 22px; color: var(--ink);
    font-family: 'Fraunces', serif; font-weight: 500;
    outline: none;
    transition: border-color .18s ease;
  }
  input.big::placeholder, textarea.big::placeholder {
    color: var(--sage-deep); font-weight: 400; font-family: 'Inter', sans-serif;
  }
  input.big:focus, textarea.big:focus { border-bottom-color: var(--ink); }
  textarea.big { resize: none; min-height: 72px; line-height: 1.4; padding-top: 10px; }

  /* Single-choice options */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex; align-items: center; gap: 14px;
    background: var(--panel); border: 1px solid var(--line-soft); border-radius: 12px;
    padding: 14px 18px; cursor: pointer;
    transition: all .14s ease;
    user-select: none;
  }
  .choice:hover { border-color: var(--ink); background: var(--panel-2); }
  .choice.selected { border-color: var(--mint); background: var(--mint-soft); }
  .choice .key {
    background: var(--panel-2); border: 1px solid var(--line-soft);
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .14s ease;
  }
  .choice.selected .key { background: var(--mint); color: #fff; border-color: var(--mint); }
  .choice .label { font-size: 16px; font-weight: 500; color: var(--ink); }
  .choice .check { margin-left: auto; opacity: 0; color: var(--mint); font-weight: 700; font-size: 16px; transition: opacity .15s; }
  .choice.selected .check { opacity: 1; }

  /* Bucket sort layout (2x2 grid on desktop, stacked on mobile) */
  .bucket-grid {
    display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px;
  }
  @media (max-width: 640px) { .bucket-grid { grid-template-columns: 1fr; } }
  .bkt {
    display: flex; flex-direction: column; gap: 10px;
    background: var(--panel); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 20px 22px; cursor: pointer;
    transition: all .14s ease;
    text-align: left;
  }
  .bkt:hover { border-color: var(--ink); background: var(--panel-2); transform: translateY(-2px); }
  .bkt.selected {
    border-color: var(--mint); background: var(--mint-soft);
  }
  .bkt .kicker {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .14em;
  }
  .bkt .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }
  .bkt .key {
    margin-left: auto;
    background: var(--panel-2); border: 1px solid var(--line-soft);
    width: 24px; height: 24px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    color: var(--muted);
    transition: all .14s ease;
  }
  .bkt.selected .key { background: var(--mint); color: #fff; border-color: var(--mint); }
  .bkt h3 {
    margin: 0; font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 20px; letter-spacing: -.015em; line-height: 1.15;
    color: var(--ink);
  }
  .bkt p { margin: 0; color: var(--muted); font-size: 13.5px; line-height: 1.5; }

  /* Contact form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid .field { display: flex; flex-direction: column; gap: 6px; }
  .form-grid label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); font-weight: 600;
  }
  .form-grid input {
    background: transparent; border: none; border-bottom: 1.5px solid var(--line);
    padding: 8px 0; font-size: 17px; color: var(--ink);
    font-family: 'Fraunces', serif; font-weight: 500;
    outline: none;
    transition: border-color .18s ease;
  }
  .form-grid input:focus { border-bottom-color: var(--ink); }
  .form-grid input::placeholder { color: var(--sage-deep); font-family: 'Inter', sans-serif; font-weight: 400; }

  /* Action row */
  .action-row { display: flex; align-items: center; gap: 14px; margin-top: 36px; flex-wrap: wrap; }
  button.ok {
    appearance: none; border: none; cursor: pointer;
    background: var(--ink); color: var(--panel);
    padding: 14px 26px; border-radius: 999px;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 10px;
    transition: transform .12s ease, background .18s ease;
  }
  button.ok:hover { background: #000; transform: translateY(-1px); }
  button.ok:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .hint {
    color: var(--muted); font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
  }
  .hint kbd {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 5px; padding: 2px 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink); font-weight: 600;
    margin: 0 1px;
  }

  .nav-back {
    position: fixed; bottom: 24px; left: 24px; z-index: 25;
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 14px; font-size: 12.5px; color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
    transition: all .14s ease;
  }
  .nav-back:hover { color: var(--ink); border-color: var(--ink); }
  .nav-back.hidden { display: none; }

  /* Intro */
  .intro { text-align: left; }
  .intro .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--line-soft);
    color: var(--muted);
    padding: 6px 12px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 30px;
  }
  .intro .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); }
  .intro h1 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(44px, 6.4vw, 76px);
    line-height: 1.02; letter-spacing: -.025em;
    margin: 0 0 26px; max-width: 15ch;
  }
  .intro p.lead {
    font-size: 18px; color: var(--muted); max-width: 560px; margin: 0 0 36px;
    line-height: 1.6;
  }
  .intro p.lead strong { color: var(--ink); font-weight: 500; }
  .intro .stats {
    display: flex; gap: 22px; margin-top: 26px;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; flex-wrap: wrap;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .intro .stats div { display: flex; align-items: center; gap: 8px; }
  .intro .stats .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); }
  .intro .stats strong { color: var(--ink); font-weight: 600; }

  /* Result */
  .result h1 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(38px, 5.6vw, 56px); line-height: 1.05; letter-spacing: -.02em;
    margin: 0 0 14px;
  }
  .result h1 em { font-style: italic; color: var(--ink); }
  .result p.lede {
    color: var(--muted); font-size: 17px; margin: 0 0 40px; max-width: 620px;
    line-height: 1.6;
  }
  .result-bucket-grid {
    display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px;
    margin-bottom: 30px;
  }
  @media (max-width: 640px) { .result-bucket-grid { grid-template-columns: 1fr; } }
  .r-bucket {
    background: var(--panel); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 22px 24px;
  }
  .r-bucket.pick { border-color: var(--mint); background: var(--mint-soft); }
  .r-bucket .kicker {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .14em;
    margin-bottom: 12px;
  }
  .r-bucket .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }
  .r-bucket .kicker .tag {
    margin-left: auto;
    background: var(--ink); color: var(--panel);
    padding: 3px 8px; border-radius: 4px; font-size: 10px; letter-spacing: .1em;
  }
  .r-bucket.pick .kicker .tag { background: var(--mint); color: #fff; }
  .r-bucket h3 {
    margin: 0 0 10px;
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 22px; letter-spacing: -.015em; line-height: 1.15;
  }
  .r-bucket .count-line {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted);
    margin-bottom: 12px; letter-spacing: .04em;
  }
  .r-bucket ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .r-bucket ul li {
    font-size: 14.5px; color: var(--ink); line-height: 1.45;
    padding-left: 16px; position: relative;
  }
  .r-bucket ul li::before {
    content: ""; position: absolute; left: 0; top: 9px;
    width: 6px; height: 1.5px; background: var(--muted);
  }
  .r-bucket .empty { color: var(--muted); font-style: italic; font-size: 14px; }

  /* Impact x Risk quadrant */
  .matrix-card {
    background: var(--panel); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 24px 26px 28px; margin: 8px 0 30px;
  }
  .matrix-card .kicker {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .14em;
    margin-bottom: 6px;
  }
  .matrix-card .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }
  .matrix-card h3 {
    margin: 0 0 6px;
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 24px; letter-spacing: -.015em; line-height: 1.2;
  }
  .matrix-card .lede {
    margin: 0 0 22px; color: var(--muted); font-size: 14.5px;
  }
  .matrix-wrap {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start;
  }
  @media (max-width: 640px) { .matrix-wrap { grid-template-columns: 1fr; } }
  .matrix {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #fff;
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 24px;
  }
  .matrix::before, .matrix::after {
    content: ""; position: absolute; background: var(--line-soft);
  }
  .matrix::before { left: 50%; top: 24px; bottom: 24px; width: 1px; }
  .matrix::after { top: 50%; left: 24px; right: 24px; height: 1px; }
  .matrix .axis {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em;
  }
  .matrix .axis.y-top    { top: 6px; left: 50%; transform: translateX(-50%); }
  .matrix .axis.y-bot    { bottom: 6px; left: 50%; transform: translateX(-50%); }
  .matrix .axis.x-left   { left: 6px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; }
  .matrix .axis.x-right  { right: 6px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: right center; }
  .matrix .quad-label {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; color: var(--muted-soft);
    text-transform: uppercase; letter-spacing: .1em;
    padding: 4px 6px;
    max-width: 42%;
  }
  .matrix .quad-label.tl { top: 30px; left: 30px; }
  .matrix .quad-label.tr { top: 30px; right: 30px; text-align: right; }
  .matrix .quad-label.bl { bottom: 30px; left: 30px; }
  .matrix .quad-label.br { bottom: 30px; right: 30px; text-align: right; }
  .matrix .pin {
    position: absolute; width: 20px; height: 20px; border-radius: 50%;
    background: var(--mint); border: 3px solid var(--panel-2);
    box-shadow: 0 0 0 2px var(--mint), 0 4px 12px rgba(72,184,152,.4);
    transform: translate(-50%, -50%);
    transition: all .4s cubic-bezier(.2,.7,.2,1);
  }
  .verdict {
    display: flex; flex-direction: column; gap: 12px;
  }
  .verdict .tag {
    align-self: flex-start;
    background: var(--mint); color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 700;
    padding: 5px 10px; border-radius: 4px;
    letter-spacing: .12em; text-transform: uppercase;
  }
  .verdict h4 {
    margin: 0;
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 22px; letter-spacing: -.015em; line-height: 1.15;
  }
  .verdict p { margin: 0; color: var(--muted); font-size: 14.5px; line-height: 1.6; }
  .verdict .facts {
    display: grid; grid-template-columns: 1fr; gap: 8px;
    margin-top: 8px; padding-top: 14px; border-top: 1px solid var(--line-soft);
  }
  .verdict .facts .row {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 13px;
  }
  .verdict .facts .lbl {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .1em;
    min-width: 76px;
  }
  .verdict .facts .val { color: var(--ink); font-weight: 500; }

  .result-cta {
    background: var(--ink); color: var(--panel); border-radius: 16px;
    padding: 34px; margin: 32px 0 20px;
  }
  .result-cta .kicker {
    font-family: 'JetBrains Mono', monospace; color: var(--mint);
    font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-cta h3 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 28px; line-height: 1.1; letter-spacing: -.015em; margin: 0 0 12px;
    color: var(--panel);
  }
  .result-cta p { color: #b8bcb0; font-size: 15px; margin: 0 0 22px; line-height: 1.6; }
  .result-cta .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .result-cta a.btn {
    background: var(--mint); color: var(--ink);
    padding: 12px 22px; border-radius: 999px;
    text-decoration: none; font-weight: 500; font-size: 15px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform .12s ease, background .18s ease;
  }
  .result-cta a.btn:hover { background: #5ec8a8; transform: translateY(-1px); }
  .result-cta a.btn.ghost { background: transparent; color: var(--panel); border: 1px solid #4a4d47; }
  .result-cta a.btn.ghost:hover { border-color: var(--panel); }

  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .result-actions button, .result-actions a {
    background: var(--panel); border: 1px solid var(--line-soft);
    color: var(--muted);
    padding: 7px 13px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
    text-decoration: none; font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .result-actions button:hover, .result-actions a:hover { color: var(--ink); border-color: var(--ink); }

  .saved-note {
    background: var(--mint-soft); border: 1px solid var(--mint); color: #275842;
    padding: 12px 16px; border-radius: 8px; font-size: 13.5px; margin-top: 20px;
  }
  .saved-note.err { background: #f5dede; border-color: #d09090; color: #7a1a1a; }

  .footer-mini {
    text-align: center; color: var(--muted); font-size: 11.5px; padding: 22px;
    max-width: 760px; margin: 0 auto;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
  }
  .footer-mini a { color: var(--muted); text-decoration: underline; }

  form.netlify-honey { display: none; }
</style>
</head>
<body>

<!-- Hidden Netlify form -->
<form name="nifty-scope-v2" netlify netlify-honeypot="bot-field" class="netlify-honey" hidden>
  <input name="bot-field" />
  <input type="text" name="business_name" />
  <input type="email" name="email" />
  <input type="text" name="contact_name" />
  <input type="tel" name="phone" />
  <textarea name="buckets_json"></textarea>
  <textarea name="answers_json"></textarea>
  <textarea name="summary_md"></textarea>
</form>

<div class="progress-outer"><div class="progress-bar" id="progressBar"></div></div>

<header class="topbar">
  <a class="brand" href="./">
    <span class="mark"><span class="dot"></span>Nifty Scope</span>
    <span class="sub">by GetNifty</span>
  </a>
  <div class="count" id="count"></div>
  <a class="exit" href="./" title="Save and exit">Save &amp; exit</a>
</header>

<main class="stage">
  <div class="card" id="card"></div>
</main>

<button class="nav-back hidden" id="backBtn" onclick="prev()">&larr; Back</button>

<div class="footer-mini">
  Autosaves locally. Nothing is sent until you submit at the end. From <a href="https://getnifty.xyz" target="_blank" rel="noopener">GetNifty</a>.
</div>

<script>
const STORAGE_KEY = "getnifty-scope-v2";

const BUCKETS = [
  { id: 1, name: "Runs itself",           kicker: "Bucket 01", desc: "Handled start to finish. No touch needed." },
  { id: 2, name: "Checked by a person",   kicker: "Bucket 02", desc: "Prepared for you, approved before it ships." },
  { id: 3, name: "Stays with you",        kicker: "Bucket 03", desc: "The judgment calls. Only you can do it." },
  { id: 4, name: "Stops happening",       kicker: "Bucket 04", desc: "Habit, not necessity. Kill it." }
];

const TASKS = [
  { id: 'emails',     title: "Answering customer emails and inquiries" },
  { id: 'followup',   title: "Following up with leads and prospects" },
  { id: 'schedule',   title: "Scheduling appointments or jobs" },
  { id: 'invoicing',  title: "Sending invoices and chasing payments" },
  { id: 'social',     title: "Posting on social media" },
  { id: 'content',    title: "Writing longer content (blog, newsletter, video scripts)" },
  { id: 'reviews',    title: "Managing your Google Business Profile and reviews" },
  { id: 'proposals',  title: "Drafting proposals and quotes" },
  { id: 'bookkeeping',title: "Bookkeeping, expenses, receipts" },
  { id: 'reporting',  title: "Weekly reporting (sales, ops, whatever your dashboard is)" }
];

const QUESTIONS = [
  // Phase 1 - Business context
  { id: 'business_name', type: 'text',   num: '01', title: "What's your <em>business</em> called?", placeholder: "e.g. Alamo Roofing Co.", required: true },
  { id: 'industry',      type: 'text',   num: '02', title: "What industry or trade?", subtitle: "Say it how you'd say it out loud.", placeholder: "e.g. Local plumbing, B2B SaaS for accountants, DTC coffee..." },
  { id: 'about',         type: 'text',   num: '03', title: "In one sentence, what do you <em>actually do</em>?", placeholder: "We help ..." },
  { id: 'model',         type: 'choice', num: '04', title: "How do customers pay you?", options: ['Per job / project', 'Monthly retainer / subscription', 'Per product sold', 'Hourly / time & materials', 'Commission', 'Mix of the above'] },
  { id: 'team',          type: 'choice', num: '05', title: "How many people work with you?", options: ['Just me', '2-5', '6-15', '16-50', '51-200', '200+'] },
  { id: 'revenue',       type: 'choice', num: '06', title: "Annual revenue?", subtitle: "Ballpark. Skip if you'd rather.", options: ['Under $100K', '$100K-500K', '$500K-2M', '$2M-10M', '$10M+', 'Prefer not to say'] },

  // Phase 2 - Current state
  { id: 'ai_use',      type: 'choice', num: '07', title: "Are you using <em>AI tools</em> in the business today?", options: ['Every day', 'Sometimes', "Tried it, didn't stick", 'Not yet', 'What?'] },
  { id: 'stack',       type: 'multi',  num: '08', title: "What's in your <em>daily stack</em>?", subtitle: "Pick everything the team actually opens.", options: ['Google Workspace', 'Microsoft 365', 'Slack', 'Notion', 'Airtable', 'HubSpot', 'Salesforce', 'QuickBooks / Xero', 'Zapier / Make', 'WordPress', 'Shopify', 'Squarespace / Webflow', 'Google Business Profile', 'Meta Ads', 'Google Ads', 'Mailchimp / Klaviyo', 'Nothing formal', 'Other'] },
  { id: 'bottleneck',  type: 'multi',  num: '09', title: "Biggest <em>bottleneck</em> right now?", subtitle: "Pick up to 2.", max: 2, options: ['Not enough leads', 'Closing sales', 'Delivering work on time', 'Team drowning in admin', 'Content & marketing', 'Hiring & training', 'Tech / website', 'Reporting & measurement', 'I am the bottleneck'] },
  { id: 'hours',       type: 'choice', num: '10', title: "Hours a week the team spends on <em>repetitive stuff</em> that could probably be automated?", options: ['0-5', '5-15', '15-30', '30+', 'Way too many', 'Honestly no idea'] },

  // Phase 3 - Bucket sort (10 tasks)
  ...TASKS.map((t, i) => ({
    id: `task_${t.id}`,
    type: 'bucket',
    num: String(11 + i).padStart(2,'0'),
    title: t.title,
    subtitle: 'Which bucket does this belong in?',
    taskId: t.id
  })),

  // Phase 4 - Score the top pain (Impact x Risk)
  { id: 'top_pains',   type: 'multi',  num: '21', title: "Of what you just sorted, which is <em>costing you the most</em> right now?", subtitle: "Pick up to 3. Ranked from most painful.", max: 3, options: TASKS.map(t => t.title) },
  { id: 'top_hours',   type: 'choice', num: '22', title: "How much time does your <em>#1 painful task</em> eat per week?", subtitle: "Across the whole team.", options: ['Under 1 hr', '1-3 hrs', '3-8 hrs', '8-20 hrs', '20+ hrs'] },
  { id: 'top_impact',  type: 'choice', num: '23', title: "If that #1 task ran <em>flawlessly</em> - what's the impact?", subtitle: "Time back, revenue, sanity, growth. Your call.", options: ['Minor lift', 'Meaningful', 'Big deal', 'Game-changer'] },
  { id: 'top_risk',    type: 'choice', num: '24', title: "If AI gets that #1 task <em>wrong</em> - what's the fallout?", subtitle: "Cost, customers, reputation, legal.", options: ['No big deal', 'Annoying but fixable', 'Expensive to unwind', 'Catastrophic'] },
  { id: 'top_owner',   type: 'choice', num: '25', title: "Who <em>does it now</em>?", options: ['I do', 'One employee', 'The whole team', 'A contractor', 'It falls through the cracks'] },

  // Phase 5 - Own words
  { id: 'custom_tasks', type: 'longtext', num: '26', title: "Anything else that <em>eats your week</em>?", subtitle: "Weird, specific, recurring. One per line.", placeholder: "e.g. Approving purchase orders every Friday\nManually copying leads from Instagram DMs" },
  { id: 'dread',        type: 'longtext', num: '27', title: "The thing you <em>dread</em> most every week?", placeholder: "One specific task. Be honest." },
  { id: 'outcome',      type: 'longtext', num: '28', title: "The <em>one outcome</em> you'd measure to know this was worth it?", placeholder: "A number, a moment, a feeling..." },

  // Phase 6 - Fit + contact
  { id: 'budget',  type: 'choice',  num: '29', title: "If we made real progress, what's this <em>worth</em> to you?", options: ['Under $500/mo', '$500-2K/mo', '$2-5K/mo', '$5-10K/mo', '$10K+/mo', 'One-time project, not monthly', 'Not sure yet'] },
  { id: 'timing',  type: 'choice',  num: '30', title: "When do you want the <em>first thing</em> live?", options: ['This week', 'This month', 'This quarter', "Whenever it's ready"] },
  { id: 'contact', type: 'contact', num: '31', title: "Where should we send your <em>bucket report</em>?", subtitle: "Real email. No spam. Joe reads every one." }
];

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { i: -1, answers: {} };
}

function save() {
  state.savedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateProgress() {
  const total = QUESTIONS.length + 1;
  const step = Math.max(state.i + 1, 0);
  const pct = state.done ? 100 : (step / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  const c = document.getElementById('count');
  if (state.done) {
    c.innerHTML = '<span class="num">Report</span>';
  } else if (state.i < 0) {
    c.innerHTML = '';
  } else {
    c.innerHTML = `<span class="num">${step}</span> / ${QUESTIONS.length}`;
  }
  document.getElementById('backBtn').classList.toggle('hidden', state.i < 0 || state.done);
}

function render() {
  const card = document.getElementById('card');
  card.classList.remove('enter');
  void card.offsetWidth;
  card.classList.add('enter');

  if (state.done) return renderResult();
  if (state.i < 0) return renderIntro();
  renderQuestion(QUESTIONS[state.i]);
  updateProgress();
}

function renderIntro() {
  const resumeText = Object.keys(state.answers).length > 0 ? 'Resume where you left off' : 'Start the scope';
  document.getElementById('card').innerHTML = `
    <div class="intro">
      <span class="eyebrow"><span class="dot"></span>~7 minutes &middot; autosaves &middot; no signup</span>
      <h1>Owners shouldn't have to <em>do</em> things.</h1>
      <p class="lead">We'll walk through everything your business does in a week and <strong>sort each task into one of four buckets</strong> - runs itself, checked by a person, stays with you, or stops happening. Then we score your #1 pain on impact and risk, so you get a real map, not a fluffy quiz.</p>
      <div class="action-row">
        <button class="ok" onclick="startOrResume()">${resumeText} <span>&rarr;</span></button>
        <span class="hint">Press <kbd>Enter</kbd></span>
      </div>
      <div class="stats">
        <div><span class="dot"></span><strong>31 questions</strong>, mostly one-tap</div>
        <div><span class="dot"></span><strong>Impact &times; Risk</strong> on your top pain</div>
        <div><span class="dot"></span><strong>Autosaves</strong>, no signup</div>
      </div>
    </div>`;
  updateProgress();
}

function renderQuestion(q) {
  const card = document.getElementById('card');
  const val = state.answers[q.id];

  let body = '';
  if (q.type === 'text') {
    body = `<div class="input-wrap"><input class="big" id="input" type="text" placeholder="${q.placeholder||''}" value="${escapeAttr(val||'')}"></div>`;
  } else if (q.type === 'longtext') {
    body = `<textarea class="big" id="input" rows="4" placeholder="${q.placeholder||''}">${escapeText(val||'')}</textarea>`;
  } else if (q.type === 'choice') {
    body = `<div class="choices">${q.options.map((opt, i) => {
      const sel = val === opt ? 'selected' : '';
      const key = String.fromCharCode(65 + i);
      return `<div class="choice ${sel}" data-value="${escapeAttr(opt)}" onclick="pickSingle('${escapeAttr(opt)}')"><span class="key">${key}</span><span class="label">${opt}</span><span class="check">&#10003;</span></div>`;
    }).join('')}</div>`;
  } else if (q.type === 'multi') {
    const selected = Array.isArray(val) ? val : [];
    body = `<div class="choices">${q.options.map((opt, i) => {
      const sel = selected.includes(opt) ? 'selected' : '';
      const key = String.fromCharCode(65 + i);
      return `<div class="choice ${sel}" data-value="${escapeAttr(opt)}" onclick="pickMulti('${escapeAttr(opt)}', ${q.max||99})"><span class="key">${key}</span><span class="label">${opt}</span><span class="check">&#10003;</span></div>`;
    }).join('')}</div>${q.max ? `<div class="hint" style="margin-top:12px;">Up to ${q.max}. Press <kbd>Enter</kbd> when done.</div>` : '<div class="hint" style="margin-top:12px;">Press <kbd>Enter</kbd> when done.</div>'}`;
  } else if (q.type === 'bucket') {
    body = `<div class="bucket-grid">${BUCKETS.map((b, i) => {
      const sel = val === b.id ? 'selected' : '';
      const key = String.fromCharCode(65 + i);
      return `<div class="bkt ${sel}" data-value="${b.id}" onclick="pickBucket(${b.id})">
        <div class="kicker"><span class="dot"></span>${b.kicker}<span class="key">${key}</span></div>
        <h3>${b.name}</h3>
        <p>${b.desc}</p>
      </div>`;
    }).join('')}</div>`;
  } else if (q.type === 'contact') {
    const c = val || {};
    body = `<div class="form-grid">
      <div class="field"><label>Your name</label><input id="ct_name" type="text" value="${escapeAttr(c.name||'')}" placeholder="Full name"></div>
      <div class="field"><label>Email</label><input id="ct_email" type="email" value="${escapeAttr(c.email||'')}" placeholder="you@company.com"></div>
      <div class="field"><label>Phone (optional)</label><input id="ct_phone" type="tel" value="${escapeAttr(c.phone||'')}" placeholder="(555) 555-1234"></div>
      <div class="field"><label>Best time to reach you</label><input id="ct_time" type="text" value="${escapeAttr(c.time||'')}" placeholder="Mornings CT"></div>
    </div>`;
  }

  const isLast = state.i === QUESTIONS.length - 1;
  const buttonLabel = isLast ? 'See my bucket report' : 'OK';
  card.innerHTML = `
    <div class="qnum">
      <span class="num">${q.num}</span>
      <span class="dot">&middot;</span>
      <span>${q.type === 'bucket' ? 'Sort into a bucket' : 'Question'}</span>
      ${q.required ? '<span class="req">&middot; required</span>' : ''}
    </div>
    <h1 class="q">${q.title}</h1>
    ${q.subtitle ? `<p class="subtitle">${q.subtitle}</p>` : ''}
    ${body}
    <div class="action-row">
      <button class="ok" id="okBtn" onclick="${isLast ? 'finish()' : 'next()'}">${buttonLabel} <span>&rarr;</span></button>
      <span class="hint">${q.type === 'longtext' ? '<kbd>Shift</kbd>+<kbd>Enter</kbd> for new line' : q.type === 'bucket' ? 'Press <kbd>A</kbd>-<kbd>D</kbd>' : 'Press <kbd>Enter</kbd>'}</span>
    </div>`;

  const input = document.getElementById('input');
  if (input) {
    input.addEventListener('input', () => { state.answers[q.id] = input.value; save(); });
    setTimeout(() => input.focus(), 60);
  }
  ['ct_name','ct_email','ct_phone','ct_time'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', () => {
        const c = state.answers[q.id] || {};
        c.name = document.getElementById('ct_name').value;
        c.email = document.getElementById('ct_email').value;
        c.phone = document.getElementById('ct_phone').value;
        c.time = document.getElementById('ct_time').value;
        state.answers[q.id] = c;
        save();
      });
    }
  });
  setTimeout(() => {
    const first = document.getElementById('ct_name') || document.getElementById('input');
    if (first && document.activeElement === document.body) first.focus();
  }, 100);
}

function pickSingle(val) {
  const q = QUESTIONS[state.i];
  state.answers[q.id] = val;
  save();
  document.querySelectorAll('.choice').forEach(el => {
    el.classList.toggle('selected', el.dataset.value === val);
  });
  setTimeout(next, 240);
}

function pickMulti(val, max) {
  const q = QUESTIONS[state.i];
  const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
  const idx = cur.indexOf(val);
  if (idx >= 0) {
    cur.splice(idx, 1);
  } else {
    if (cur.length >= max) return;
    cur.push(val);
  }
  state.answers[q.id] = cur;
  save();
  document.querySelectorAll('.choice').forEach(el => {
    el.classList.toggle('selected', cur.includes(el.dataset.value));
  });
}

function pickBucket(bucketId) {
  const q = QUESTIONS[state.i];
  state.answers[q.id] = bucketId;
  save();
  document.querySelectorAll('.bkt').forEach(el => {
    el.classList.toggle('selected', String(bucketId) === el.dataset.value);
  });
  setTimeout(next, 260);
}

function next() {
  const q = QUESTIONS[state.i];
  if (q && q.required && !state.answers[q.id]) {
    const input = document.getElementById('input');
    if (input) { input.focus(); input.style.borderBottomColor = '#c33'; setTimeout(() => input.style.borderBottomColor = '', 800); }
    return;
  }
  const card = document.getElementById('card');
  card.classList.remove('enter'); card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    state.i++;
    if (state.i >= QUESTIONS.length) state.i = QUESTIONS.length - 1;
    save();
    render();
  }, 240);
}

function prev() {
  if (state.i <= -1) return;
  const card = document.getElementById('card');
  card.classList.remove('enter'); card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    if (state.done) { state.done = false; state.i = QUESTIONS.length - 1; }
    else state.i--;
    save();
    render();
  }, 200);
}

function startOrResume() {
  if (state.i < 0) state.i = 0;
  save();
  render();
}

function finish() {
  const q = QUESTIONS[state.i];
  const c = state.answers[q.id];
  if (!c || !c.email) {
    document.getElementById('ct_email')?.focus();
    return;
  }
  state.done = true;
  save();

  const buckets = groupByBucket(state.answers);
  const summary = buildSummary(state.answers, buckets);
  const body = new URLSearchParams({
    'form-name': 'nifty-scope-v2',
    'business_name': state.answers.business_name || '',
    'email': c.email || '',
    'contact_name': c.name || '',
    'phone': c.phone || '',
    'buckets_json': JSON.stringify(buckets),
    'answers_json': JSON.stringify(state.answers),
    'summary_md': summary
  });
  fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })
    .then(r => { state.submitted = r.ok; save(); renderResult(); })
    .catch(() => { state.submitted = false; save(); renderResult(); });

  render();
}

/* ---------- Grouping ---------- */
function groupByBucket(a) {
  const groups = { 1: [], 2: [], 3: [], 4: [] };
  TASKS.forEach(t => {
    const bId = a[`task_${t.id}`];
    if (bId && groups[bId]) groups[bId].push(t.title);
  });
  const customText = (a.custom_tasks || '').trim();
  if (customText) {
    customText.split('\n').filter(Boolean).forEach(line => {
      groups[3].push(line.trim() + ' (your own)');
    });
  }
  return groups;
}

function buildSummary(a, buckets) {
  const brand = a.business_name || 'Your business';
  const lines = [];
  lines.push(`# Nifty Scope report - ${brand}`);
  lines.push('');
  BUCKETS.forEach(b => {
    lines.push(`## ${b.kicker} - ${b.name}`);
    const items = buckets[b.id] || [];
    if (items.length === 0) lines.push('_(empty)_');
    else items.forEach(x => lines.push(`- ${x}`));
    lines.push('');
  });
  lines.push('## Answers');
  QUESTIONS.forEach(q => {
    const v = a[q.id];
    if (v == null || v === '') return;
    if (q.type === 'bucket') return;
    let val = v;
    if (typeof v === 'object') val = Object.entries(v).map(([k,x])=>`${k}: ${x}`).join(' | ');
    lines.push(`- **${q.title.replace(/<[^>]+>/g,'')}** ${val}`);
  });
  return lines.join('\n');
}

function renderMatrix(a) {
  const impactMap = { 'Minor lift': 0, 'Meaningful': 1, 'Big deal': 2, 'Game-changer': 3 };
  const riskMap   = { 'No big deal': 0, 'Annoying but fixable': 1, 'Expensive to unwind': 2, 'Catastrophic': 3 };
  const iv = impactMap[a.top_impact];
  const rv = riskMap[a.top_risk];
  if (iv == null || rv == null) return '';

  const highI = iv >= 2;
  const highR = rv >= 2;

  let tag, name, blurb;
  if (highI && !highR) {
    tag = 'AUTOMATE HARD';
    name = "Runs itself. Ship it.";
    blurb = "High impact, low blast radius. This is the ideal Bucket 01 candidate - automate end-to-end with confidence. Fastest ROI in your business.";
  } else if (highI && highR) {
    tag = 'HYBRID - HUMAN IN THE LOOP';
    name = "Checked by a person before it ships.";
    blurb = "High reward but real downside if it slips. Draft with AI, approve with a human. This is Bucket 02 - the workhorse of a well-run AI stack.";
  } else if (!highI && highR) {
    tag = 'LEAVE IT ALONE';
    name = "Not worth the risk.";
    blurb = "Small upside, real downside. Keep this fully human until either the upside grows or the risk shrinks. Don't be a hero here.";
  } else {
    tag = 'KILL IT';
    name = "Stop doing this altogether.";
    blurb = "Low impact and low risk means low priority. Ask honestly whether this task should exist at all. The cheapest task is the one nobody has to do.";
  }

  const pinX = 12 + (rv / 3) * 76;
  const pinY = 12 + (1 - iv / 3) * 76;

  const top = Array.isArray(a.top_pains) ? a.top_pains[0] : null;
  const painLine = top ? `<span class="val">${escapeText(top)}</span>` : '<span class="val" style="color:var(--muted-soft);font-style:italic;">Unspecified</span>';
  const hoursLine = a.top_hours ? `<span class="val">${escapeText(a.top_hours)}</span>` : '<span class="val" style="color:var(--muted-soft);">-</span>';
  const ownerLine = a.top_owner ? `<span class="val">${escapeText(a.top_owner)}</span>` : '<span class="val" style="color:var(--muted-soft);">-</span>';

  return `
    <div class="matrix-card">
      <div class="kicker"><span class="dot"></span>Impact &times; Risk on your #1 pain</div>
      <h3>${name}</h3>
      <p class="lede">Where your most costly task lands on the audit matrix - and how to treat it.</p>
      <div class="matrix-wrap">
        <div class="matrix">
          <div class="axis y-top">High impact</div>
          <div class="axis y-bot">Low impact</div>
          <div class="axis x-left">Low risk</div>
          <div class="axis x-right">High risk</div>
          <div class="quad-label tl">Automate hard</div>
          <div class="quad-label tr">Hybrid HITL</div>
          <div class="quad-label bl">Kill or ignore</div>
          <div class="quad-label br">Leave alone</div>
          <div class="pin" style="left:${pinX}%;top:${pinY}%"></div>
        </div>
        <div class="verdict">
          <span class="tag">${tag}</span>
          <p>${blurb}</p>
          <div class="facts">
            <div class="row"><span class="lbl">Top pain</span>${painLine}</div>
            <div class="row"><span class="lbl">Impact</span><span class="val">${escapeText(a.top_impact)}</span></div>
            <div class="row"><span class="lbl">Risk</span><span class="val">${escapeText(a.top_risk)}</span></div>
            <div class="row"><span class="lbl">Hours/wk</span>${hoursLine}</div>
            <div class="row"><span class="lbl">Owner now</span>${ownerLine}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderResult() {
  const buckets = groupByBucket(state.answers);
  const brand = state.answers.business_name || 'your business';
  const b1 = buckets[1].length;
  const b2 = buckets[2].length;
  const b3 = buckets[3].length;
  const b4 = buckets[4].length;
  const totalOff = b1 + b2 + b4;
  const total = b1 + b2 + b3 + b4;

  const bucketCards = BUCKETS.map(b => {
    const items = buckets[b.id] || [];
    const isPick = (b.id === 1 || b.id === 2);
    const tag = b.id === 1 ? 'GETNIFTY BUILDS' : b.id === 2 ? 'GETNIFTY CHECKS' : b.id === 3 ? 'YOURS TO KEEP' : "LET'S KILL";
    return `<div class="r-bucket ${isPick ? 'pick' : ''}">
      <div class="kicker">
        <span class="dot"></span>${b.kicker}
        <span class="tag">${tag}</span>
      </div>
      <h3>${b.name}</h3>
      <div class="count-line">${items.length} ${items.length === 1 ? 'task' : 'tasks'}</div>
      ${items.length === 0 ? '<div class="empty">Nothing here yet</div>' : `<ul>${items.map(x => `<li>${escapeText(x)}</li>`).join('')}</ul>`}
    </div>`;
  }).join('');

  const dreadNote = state.answers.dread ? `<p style="margin-top:10px;font-size:15px;color:var(--muted);"><em>You said the thing you dread most is:</em> "${escapeText(state.answers.dread)}"</p>` : '';

  const matrixHtml = renderMatrix(state.answers);

  const submitNote = state.submitted === false
    ? '<div class="saved-note err">Couldn\'t send your report over the wire. Your data is saved locally - export below and email it to joe@getnifty.xyz.</div>'
    : (state.submitted ? `<div class="saved-note">Sent to Joe. If you gave an email (${escapeText(state.answers.contact?.email || '')}), we'll reply within 1 business day.</div>` : '');

  document.getElementById('card').innerHTML = `
    <div class="result">
      <div class="qnum">
        <span class="num">04</span>
        <span class="dot">&middot;</span>
        <span>Your bucket report</span>
      </div>
      <h1>Here's how <em>${escapeText(brand)}</em>'s week actually sorts.</h1>
      <p class="lede">Out of ${total} tasks we walked through, <strong>${totalOff} could come off your plate</strong>. That's what "runs itself" and "checked by a person" plus "stops happening" adds up to.</p>
      ${dreadNote}
      <div class="result-bucket-grid">${bucketCards}</div>
      ${matrixHtml}
      <div class="result-cta">
        <div class="kicker">Ready to make it real?</div>
        <h3>20 minutes with Joe - we scope buckets 1 &amp; 2 and give you a price.</h3>
        <p>No slide deck, no pressure. We'll tell you if it's a fit and what it costs to run. If it's not a fit, we'll tell you that too.</p>
        <div class="row">
          <a class="btn" href="mailto:joe@getnifty.xyz?subject=Nifty Scope report - ${encodeURIComponent(brand)}&body=${encodeURIComponent('Hi Joe, I finished the Nifty Scope. Buckets 1 (runs itself) + 2 (checked by a person) came out to ' + (b1+b2) + ' tasks. Let\'s book time.')}">Email Joe &rarr;</a>
          <a class="btn ghost" href="https://getnifty.xyz" target="_blank" rel="noopener">See GetNifty</a>
        </div>
      </div>
      ${submitNote}
      <div class="result-actions">
        <button onclick="downloadJSON()">Download JSON</button>
        <button onclick="downloadMarkdown()">Download Markdown</button>
        <button onclick="window.print()">Print</button>
        <button onclick="resetAll()">Start over</button>
      </div>
    </div>`;
  updateProgress();
}

/* ---------- Exports ---------- */
function downloadJSON() {
  const payload = { business: state.answers.business_name || '', answers: state.answers, buckets: groupByBucket(state.answers), savedAt: state.savedAt };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  download(blob, slug() + '-buckets.json');
}
function downloadMarkdown() {
  const md = buildSummary(state.answers, groupByBucket(state.answers));
  const blob = new Blob([md], { type: 'text/markdown' });
  download(blob, slug() + '-buckets.md');
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
}
function slug() {
  return (state.answers.business_name || 'nifty-scope').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'') || 'nifty-scope';
}
function resetAll() {
  if (!confirm('Reset your answers? Export first if you want a copy.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { i: -1, answers: {} };
  render();
}

/* ---------- Utils ---------- */
function escapeAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeText(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---------- Keyboard ---------- */
document.addEventListener('keydown', (e) => {
  if (state.done) return;
  if (state.i < 0) {
    if (e.key === 'Enter') { e.preventDefault(); startOrResume(); }
    return;
  }
  const q = QUESTIONS[state.i];
  if (e.key === 'Enter' && !e.shiftKey) {
    if (q.type === 'longtext') return;
    e.preventDefault();
    if (state.i === QUESTIONS.length - 1) finish(); else next();
  } else if (e.key === 'Escape' && q.type !== 'contact') {
    prev();
  } else if (q.type === 'choice') {
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      pickSingle(q.options[idx]);
    }
  } else if (q.type === 'multi') {
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      pickMulti(q.options[idx], q.max || 99);
    }
  } else if (q.type === 'bucket') {
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < 4 && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      pickBucket(BUCKETS[idx].id);
    }
  }
});

render();
</script>
</body>
</html>
