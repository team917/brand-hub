<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Start the Deep Scope | Nifty Scope Deep</title>
<meta name="description" content="Fifty business practices, who does each one, how's it going. Get an ops map, a stack rank, and a real recommendation. Autosaves. Free.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='24' fill='%2348b898'/%3E%3C/svg%3E">
<style>
  :root {
    --paper: #f4f6ee;
    --paper-2: #ffffff;
    --bg: #d5d9cf;
    --ink: #1a1c1a;
    --ink-soft: #2b2e2b;
    --muted: #6b6f65;
    --muted-soft: #8b8f85;
    --line: #b8bcaf;
    --line-soft: #cfd3c8;
    --mint: #48b898;
    --mint-soft: #d4ede4;
    --amber: #d99a3a;
    --red: #c33f3f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--paper); color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--ink); }
  kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--paper-2); border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 6px; color: var(--muted);
  }
  ::selection { background: var(--mint); color: #fff; }

  /* Top bar */
  header.bar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(244,246,238,.94);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line-soft);
  }
  .bar-inner { max-width: 900px; margin: 0 auto; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: baseline; gap: 10px; text-decoration: none; color: inherit; }
  .brand .mark { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; letter-spacing: -.015em; display: inline-flex; align-items: baseline; gap: 8px; }
  .brand .mark .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); display: inline-block; }
  .brand .sub { color: var(--muted); font-size: 10px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .1em; }
  .bar-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .bar-actions button, .bar-actions a {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    padding: 7px 14px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
    font-family: inherit; text-decoration: none; transition: all .12s ease;
  }
  .bar-actions button:hover, .bar-actions a:hover { color: var(--ink); border-color: var(--ink); }
  .bar-actions .saved { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); padding: 0 4px; }

  /* Progress */
  .progress { height: 3px; background: transparent; position: relative; }
  .progress .fill { height: 100%; width: 0; background: var(--mint); transition: width .35s ease; }

  /* Card */
  main.stage { max-width: 780px; margin: 0 auto; padding: 60px 32px 120px; }
  .card {
    background: var(--paper-2);
    border: 1px solid var(--line-soft);
    border-radius: 18px;
    padding: 48px 44px 40px;
    box-shadow: 0 1px 0 rgba(26,28,26,.02), 0 20px 60px rgba(26,28,26,.05);
    opacity: 1; transform: translateY(0);
    transition: opacity .22s ease, transform .22s ease;
  }
  .card.enter { opacity: 0; transform: translateY(8px); }
  .card.exit  { opacity: 0; transform: translateY(-8px); }
  @media (max-width: 640px) { .card { padding: 32px 22px 28px; } }

  .qnum {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em;
    display: flex; align-items: center; gap: 10px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .qnum .num { color: var(--ink); font-weight: 600; }
  .qnum .req { color: var(--amber); }
  .qnum .lane-tag {
    background: var(--mint-soft); color: #205e4a;
    padding: 3px 9px; border-radius: 999px; font-size: 10.5px; letter-spacing: .08em;
  }

  h1.q {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(28px, 4vw, 38px);
    line-height: 1.15; letter-spacing: -.018em;
    margin: 0 0 12px; color: var(--ink);
  }
  h1.q em { font-style: italic; color: var(--ink); font-weight: 500; }
  .subtitle { color: var(--muted); font-size: 15.5px; margin: 0 0 26px; line-height: 1.55; }

  /* text input */
  .input-wrap { position: relative; }
  input.big, textarea.big, select.big {
    width: 100%;
    background: transparent;
    border: none; border-bottom: 2px solid var(--line);
    padding: 10px 0 12px;
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: clamp(20px, 2.6vw, 26px);
    color: var(--ink); outline: none;
    transition: border-color .18s ease;
  }
  input.big:focus, textarea.big:focus, select.big:focus { border-bottom-color: var(--ink); }
  textarea.big { font-family: 'Inter', sans-serif; font-size: 17px; line-height: 1.55; resize: vertical; }

  /* choice/multi */
  .choices { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .choice {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border: 1px solid var(--line); background: var(--paper-2);
    border-radius: 10px; cursor: pointer;
    transition: all .12s ease;
  }
  .choice:hover { border-color: var(--ink); }
  .choice.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .choice .key {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--paper); color: var(--muted);
    padding: 2px 6px; border-radius: 4px; min-width: 20px; text-align: center;
    border: 1px solid var(--line-soft);
  }
  .choice.selected .key { background: var(--paper); color: var(--ink); border-color: var(--paper); }
  .choice .label { flex: 1; font-size: 15px; }
  .choice .check { opacity: 0; font-size: 14px; }
  .choice.selected .check { opacity: 1; }

  /* practice card - 4 stacked rows of pills */
  .practice { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .p-row {
    padding: 14px 16px;
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    transition: opacity .18s ease;
  }
  .p-row.dimmed { opacity: .35; pointer-events: none; }
  .p-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
    color: var(--muted); margin-bottom: 10px;
  }
  .p-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .p-pill {
    padding: 8px 14px; border: 1px solid var(--line); background: var(--paper-2);
    color: var(--ink-soft); font-size: 13.5px; border-radius: 999px; cursor: pointer;
    font-family: inherit; transition: all .12s ease;
  }
  .p-pill:hover { border-color: var(--ink); color: var(--ink); }
  .p-pill.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .p-pill.warn.selected { background: var(--amber); color: var(--ink); border-color: var(--amber); }
  .p-pill.bad.selected { background: var(--red); color: var(--paper); border-color: var(--red); }
  .p-pill.good.selected { background: var(--mint); color: var(--ink); border-color: var(--mint); }

  /* Actions */
  .action-row {
    display: flex; align-items: center; gap: 14px; margin-top: 32px; flex-wrap: wrap;
  }
  button.ok, button.skip {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--paper);
    border: none; padding: 14px 26px; border-radius: 999px;
    font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer;
    transition: transform .12s ease, background .18s ease;
  }
  button.ok:hover, button.skip:hover { background: #000; transform: translateY(-1px); }
  button.skip { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  button.skip:hover { background: transparent; color: var(--ink); border-color: var(--ink); }
  .hint { color: var(--muted); font-size: 12.5px; margin-left: 4px; }

  /* Contact form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; margin-top: 8px; }
  @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .field input {
    background: transparent; border: none; border-bottom: 2px solid var(--line);
    padding: 8px 0; font-family: 'Inter', sans-serif; font-size: 17px; color: var(--ink); outline: none;
    transition: border-color .18s ease;
  }
  .field input:focus { border-bottom-color: var(--ink); }

  /* Intro */
  .intro { text-align: center; padding: 60px 30px; }
  .intro .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    text-transform: uppercase; letter-spacing: .14em;
    color: var(--muted); margin-bottom: 24px;
  }
  .intro .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }
  .intro h1 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(38px, 5.4vw, 60px);
    line-height: 1.05; letter-spacing: -.02em;
    margin: 0 auto 22px; max-width: 20ch;
  }
  .intro p.lede { color: var(--muted); font-size: 17px; max-width: 560px; margin: 0 auto 34px; line-height: 1.6; }
  .intro .meta { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; color: var(--muted); font-size: 12.5px; font-family: 'JetBrains Mono', monospace; margin-bottom: 34px; }
  .intro .meta .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); margin-right: 6px; vertical-align: middle; }
  .intro .meta strong { color: var(--ink); }

  /* Report */
  .report h1 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(32px, 4.4vw, 44px);
    line-height: 1.1; letter-spacing: -.02em;
    margin: 0 0 14px;
  }
  .report h1 em { font-style: italic; }
  .report .lede { color: var(--muted); font-size: 16.5px; margin: 0 0 26px; line-height: 1.6; }
  .report .lede strong { color: var(--ink); }

  .rsection { margin: 32px 0; }
  .rsection h2 {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 22px; letter-spacing: -.01em; margin: 0 0 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--line-soft);
  }
  .rsection .rkicker {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase;
    letter-spacing: .12em; color: var(--mint); margin-bottom: 6px;
  }

  /* KPI grid */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 4px 0 8px; }
  @media (max-width: 640px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--paper); border: 1px solid var(--line-soft);
    border-radius: 10px; padding: 14px 16px;
  }
  .kpi .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .kpi .v { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -.01em; margin-top: 4px; color: var(--ink); }
  .kpi .v.mint { color: #1f7658; }
  .kpi .v.amber { color: #a5741f; }

  /* Ops map table */
  .ops-lane { margin-bottom: 20px; }
  .ops-lane h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    margin: 0 0 8px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .ops-lane h3 .cnt { color: var(--ink-soft); font-weight: 500; }
  .ops-table {
    width: 100%; border-collapse: collapse; font-size: 13.5px;
    background: var(--paper); border: 1px solid var(--line-soft); border-radius: 10px; overflow: hidden;
  }
  .ops-table th, .ops-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line-soft); }
  .ops-table tr:last-child td { border-bottom: none; }
  .ops-table th {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); font-weight: 600; background: var(--paper-2);
  }
  .ops-table td.practice { color: var(--ink); font-weight: 500; }
  .ops-table td.who { color: var(--muted); }
  .ops-table td.status .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
    background: var(--paper-2); border: 1px solid var(--line-soft); color: var(--muted);
  }
  .ops-table td.status .pill.good { background: var(--mint-soft); border-color: transparent; color: #1f7658; }
  .ops-table td.status .pill.warn { background: #f5e1c1; border-color: transparent; color: #7a520f; }
  .ops-table td.status .pill.bad  { background: #f2c9c9; border-color: transparent; color: #7c2020; }
  .ops-table td.hours { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: right; white-space: nowrap; }

  /* Stack rank */
  .rank-list { display: flex; flex-direction: column; gap: 10px; }
  .rank {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; background: var(--paper); border: 1px solid var(--line-soft); border-radius: 12px;
  }
  .rank .r-num { font-family: 'Fraunces', serif; font-size: 28px; color: var(--ink); min-width: 36px; }
  .rank .r-body { flex: 1; }
  .rank .r-title { font-weight: 500; font-size: 15px; color: var(--ink); }
  .rank .r-meta { font-size: 12.5px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
  .rank .r-score {
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    background: var(--ink); color: var(--paper); padding: 4px 10px; border-radius: 999px;
  }

  /* First move */
  .moves { display: grid; gap: 14px; }
  .move {
    background: var(--paper); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 18px 20px;
  }
  .move.pick { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .move.pick p, .move.pick li { color: #b8bcb0; }
  .move.pick .m-lane { color: var(--mint); }
  .m-lane { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--mint); margin-bottom: 6px; }
  .move h3 { margin: 0 0 8px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; letter-spacing: -.01em; }
  .move p { margin: 0 0 8px; font-size: 14px; line-height: 1.55; color: var(--muted); }
  .move ul { margin: 6px 0 0; padding-left: 18px; font-size: 13.5px; line-height: 1.6; color: var(--muted); }

  /* Lane recs */
  .lane-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 720px) { .lane-cards { grid-template-columns: 1fr; } }
  .lane-card {
    background: var(--paper); border: 1px solid var(--line-soft); border-radius: 12px;
    padding: 16px 18px;
  }
  .lane-card.pick { background: var(--mint-soft); border-color: transparent; }
  .lane-card .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .lane-card h4 { margin: 6px 0 8px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 19px; letter-spacing: -.01em; }
  .lane-card p { margin: 0; font-size: 13.5px; color: var(--muted); line-height: 1.5; }
  .lane-card .stat { font-size: 12px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; margin-top: 6px; }

  /* CTA */
  .result-cta {
    background: var(--ink); color: var(--paper);
    border-radius: 14px; padding: 26px 28px; margin: 30px 0 20px;
  }
  .result-cta .kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--mint); margin-bottom: 8px; }
  .result-cta h3 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 22px; margin: 0 0 8px; letter-spacing: -.01em; }
  .result-cta p { margin: 0 0 16px; color: #b8bcb0; font-size: 14.5px; }
  .result-cta .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .result-cta .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 500;
    text-decoration: none;
    background: var(--mint); color: var(--ink); border: 1px solid var(--mint);
  }
  .result-cta .btn.ghost { background: transparent; color: var(--paper); border-color: #4a4c48; }

  .saved-note {
    background: var(--mint-soft); color: #1f5947; border: 1px solid #b8dfd0;
    padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 20px;
  }
  .saved-note.err { background: #f2c9c9; color: #7c2020; border-color: #e0a5a5; }

  .result-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px;
    padding-top: 20px; border-top: 1px solid var(--line-soft);
  }
  .result-actions button {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    padding: 7px 14px; border-radius: 999px; font-size: 12.5px; cursor: pointer; font-family: inherit;
  }
  .result-actions button:hover { color: var(--ink); border-color: var(--ink); }

  footer.mini {
    text-align: center; color: var(--muted); font-size: 11.5px; padding: 22px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .05em;
  }
  footer.mini a { color: var(--muted); text-decoration: underline; }
</style>
</head>
<body>

<!-- hidden form for Netlify capture -->
<form name="nifty-scope-deep" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="bot-field">
  <input type="text" name="business_name">
  <input type="email" name="email">
  <input type="text" name="contact_name">
  <input type="text" name="phone">
  <textarea name="ops_map_json"></textarea>
  <textarea name="answers_json"></textarea>
  <textarea name="summary_md"></textarea>
</form>

<header class="bar">
  <div class="bar-inner">
    <a class="brand" href="./">
      <span class="mark"><span class="dot"></span>Nifty Scope Deep</span>
      <span class="sub">by GetNifty</span>
    </a>
    <div class="bar-actions">
      <span class="saved" id="savedTag">Autosaves as you type</span>
      <button id="backBtn" onclick="prev()" title="Back (Esc)">&larr; Back</button>
      <button id="resetBtn" onclick="resetAll()" title="Clear and start over">Reset</button>
    </div>
  </div>
  <div class="progress"><div class="fill" id="progressBar"></div></div>
</header>

<main class="stage">
  <div class="card enter" id="card"></div>
</main>

<footer class="mini">
  <span>Free from <a href="https://getnifty.xyz" target="_blank" rel="noopener">GetNifty</a> &middot; No signup, no lock-in. Joe reads every report.</span>
</footer>

<script>
"use strict";

const STORAGE_KEY = 'nifty-scope-deep-v1';
const FORM_NAME = 'nifty-scope-deep';

/* ---------- Data model ---------- */

const LANES = [
  { id: 'leadgen',   name: 'Lead generation',       kicker: 'Lane 01' },
  { id: 'sales',     name: 'Sales',                 kicker: 'Lane 02' },
  { id: 'delivery',  name: 'Delivery & ops',        kicker: 'Lane 03' },
  { id: 'cs',        name: 'Customer service',      kicker: 'Lane 04' },
  { id: 'finance',   name: 'Finance',               kicker: 'Lane 05' },
  { id: 'marketing', name: 'Marketing & content',   kicker: 'Lane 06' },
  { id: 'people',    name: 'People & HR',           kicker: 'Lane 07' },
  { id: 'tech',      name: 'Tech & data',           kicker: 'Lane 08' }
];

// GetNifty productization lanes (Marketing, Sales, Content per GetNifty mission)
const NIFTY_LANE_MAP = {
  leadgen:   'marketing',
  sales:     'sales',
  delivery:  'ops',
  cs:        'ops',
  finance:   'ops',
  marketing: 'content',
  people:    'ops',
  tech:      'ops'
};

const PRACTICES = [
  // Lead gen (7)
  { id: 'seo',            lane: 'leadgen', title: 'SEO (organic Google traffic)',       sub: 'Keywords, on-page, technical, links.' },
  { id: 'gbp',            lane: 'leadgen', title: 'Google Business Profile',            sub: 'Local pack, posts, reviews, photos.' },
  { id: 'paid_ads',       lane: 'leadgen', title: 'Paid ads',                           sub: 'Google Ads, Meta, LinkedIn, wherever you spend.' },
  { id: 'referrals',      lane: 'leadgen', title: 'Referral program',                   sub: 'Formal ask + reward, not just word-of-mouth.' },

/* Build the practice questions dynamically. Each practice = 1 question that captures 4 sub-answers. */
const PRACTICE_QS = PRACTICES.map((p, i) => {
  const laneMeta = LANES.find(l => l.id === p.lane);
  const laneIdx  = LANES.findIndex(l => l.id === p.lane) + 1;
  const laneCount = PRACTICES.filter(x => x.lane === p.lane).length;
  const laneOrder = PRACTICES.filter(x => x.lane === p.lane).findIndex(x => x.id === p.id) + 1;
  return {
    id: `practice_${p.id}`,
    type: 'practice',
    phase: laneMeta.name,
    practiceId: p.id,
    laneId: p.lane,
    laneMeta,
    laneOrder,
    laneCount,
    laneIdx,
    title: p.title,
    subtitle: p.sub
  };
});

/* Master question list */
const QUESTIONS = [ ...CONTEXT_QS, ...PRACTICE_QS, ...WRAPUP_QS ];

/* ---------- State ---------- */

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { i: -1, answers: {}, practices: {} };
}

function save() {
  state.savedAt = new Date().toISOString();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  const tag = document.getElementById('savedTag');
  if (tag) tag.textContent = 'Saved ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function updateProgress() {
  const total = QUESTIONS.length + 1;
  const step = Math.max(state.i + 1, 0);
  const pct = state.done ? 100 : (step / total) * 100;
  const bar = document.getElementById('progressBar');
  if (bar) bar.style.width = pct + '%';
}

/* ---------- Render router ---------- */

function render() {
  const card = document.getElementById('card');
  card.classList.remove('exit');
  card.classList.add('enter');
  requestAnimationFrame(() => card.classList.remove('enter'));

  document.getElementById('backBtn').style.visibility = (state.i > -1 && !state.done) ? 'visible' : 'hidden';

  if (state.done) { renderResult(); return; }
  if (state.i < 0) { renderIntro(); updateProgress(); return; }
  renderQuestion(QUESTIONS[state.i]);
  updateProgress();
}

/* ---------- Intro ---------- */

function renderIntro() {
  const card = document.getElementById('card');
  const hasProgress = Object.keys(state.answers).length > 0 || Object.keys(state.practices || {}).length > 0;
  card.innerHTML = `
    <div class="intro">
      <div class="eyebrow"><span class="dot"></span>The Deep Scope</div>
      <h1>Every practice, every owner, one map.</h1>
      <p class="lede">Walk through 50 business practices in 8 lanes. For each one, tell us <strong>who</strong> does it and <strong>how it's going</strong>. Skip anything you don't do. Get a real ops map and a ranked plan on where to start.</p>
      <div class="meta">
        <div><span class="dot"></span><strong>10 min</strong> if you engage</div>
        <div><span class="dot"></span><strong>50 practices</strong>, one screen each</div>
        <div><span class="dot"></span><strong>Autosaves</strong></div>
        <div><span class="dot"></span><strong>Skip anything</strong> you don't do</div>
      </div>
      <div class="action-row" style="justify-content:center;">
        <button class="ok" onclick="startOrResume()">${hasProgress ? 'Resume where I left off' : 'Start the audit'} <span>&rarr;</span></button>
        ${hasProgress ? '<button class="skip" onclick="resetAll()">Start over</button>' : ''}
      </div>
    </div>`;
}

/* ---------- Question ---------- */

function renderQuestion(q) {
  const card = document.getElementById('card');
  const val = state.answers[q.id];
  const totalContext = CONTEXT_QS.length;
  const totalPractice = PRACTICE_QS.length;
  const totalWrap = WRAPUP_QS.length;

  let numLabel = '', phaseLabel = q.phase || 'Question';
  if (state.i < totalContext) {
    numLabel = 'Ctx ' + String(state.i + 1).padStart(2,'0') + '/' + totalContext;
  } else if (state.i < totalContext + totalPractice) {
    const pIdx = state.i - totalContext;
    numLabel = String(q.laneIdx).padStart(2,'0') + '.' + String(q.laneOrder).padStart(2,'0');
    phaseLabel = `${q.laneMeta.name} &middot; ${q.laneOrder}/${q.laneCount}`;
  } else {
    const wIdx = state.i - totalContext - totalPractice + 1;
    numLabel = 'Wrap ' + String(wIdx).padStart(2,'0') + '/' + totalWrap;
  }

  let body = '';
  if (q.type === 'text') {
    body = `<div class="input-wrap"><input class="big" id="input" type="text" placeholder="${escapeAttr(q.placeholder||'')}" value="${escapeAttr(val||'')}"></div>`;
  } else if (q.type === 'longtext') {
    body = `<textarea class="big" id="input" rows="4" placeholder="${escapeAttr(q.placeholder||'')}">${escapeText(val||'')}</textarea>`;
  } else if (q.type === 'choice') {
    body = `<div class="choices">${q.options.map((opt, i) => {
      const sel = val === opt ? 'selected' : '';
      const key = String.fromCharCode(65 + i);
      return `<div class="choice ${sel}" data-value="${escapeAttr(opt)}" onclick="pickSingle('${escapeAttr(opt)}')"><span class="key">${key}</span><span class="label">${escapeText(opt)}</span><span class="check">&#10003;</span></div>`;
    }).join('')}</div>`;
  } else if (q.type === 'multi') {
    const selected = Array.isArray(val) ? val : [];
    body = `<div class="choices">${q.options.map((opt, i) => {
      const sel = selected.includes(opt) ? 'selected' : '';
      const key = String.fromCharCode(65 + i);
      return `<div class="choice ${sel}" data-value="${escapeAttr(opt)}" onclick="pickMulti('${escapeAttr(opt)}', ${q.max||99})"><span class="key">${key}</span><span class="label">${escapeText(opt)}</span><span class="check">&#10003;</span></div>`;
    }).join('')}</div>${q.max ? `<div class="hint" style="margin-top:12px;">Up to ${q.max}. Press <kbd>Enter</kbd> when done.</div>` : '<div class="hint" style="margin-top:12px;">Press <kbd>Enter</kbd> when done.</div>'}`;
  } else if (q.type === 'practice') {
    body = renderPracticeBody(q);
  } else if (q.type === 'contact') {
    const c = val || {};
    body = `<div class="form-grid">
      <div class="field"><label>Your name</label><input id="ct_name" type="text" value="${escapeAttr(c.name||'')}" placeholder="Full name"></div>
      <div class="field"><label>Email</label><input id="ct_email" type="email" value="${escapeAttr(c.email||'')}" placeholder="you@company.com"></div>
      <div class="field"><label>Phone (optional)</label><input id="ct_phone" type="tel" value="${escapeAttr(c.phone||'')}" placeholder="(555) 555-1234"></div>
      <div class="field"><label>Best time to reach you</label><input id="ct_time" type="text" value="${escapeAttr(c.time||'')}" placeholder="Mornings CT"></div>
    </div>`;
  }

  const isLast = state.i === QUESTIONS.length - 1;
  const buttonLabel = isLast ? 'See my audit report' : 'Next';
  const showSkip = (q.type === 'practice') && (q.laneOrder === 1);
  const skipLaneBtn = showSkip ? `<button class="skip" onclick="skipLane('${q.laneId}')" title="Skip everything in this lane">Skip this whole lane</button>` : '';

  card.innerHTML = `
    <div class="qnum">
      <span class="num">${numLabel}</span>
      <span class="lane-tag">${phaseLabel}</span>
      ${q.required ? '<span class="req">&middot; required</span>' : ''}
    </div>
    <h1 class="q">${q.title}</h1>
    ${q.subtitle ? `<p class="subtitle">${q.subtitle}</p>` : ''}
    ${body}
    <div class="action-row">
      <button class="ok" id="okBtn" onclick="${isLast ? 'finish()' : 'next()'}">${buttonLabel} <span>&rarr;</span></button>
      ${skipLaneBtn}
      <span class="hint">${q.type === 'longtext' ? '<kbd>Shift</kbd>+<kbd>Enter</kbd> for a new line' : q.type === 'practice' ? 'Pick each row - "No" skips the rest.' : 'Press <kbd>Enter</kbd>'}</span>
    </div>`;

  const input = document.getElementById('input');
  if (input) {
    input.addEventListener('input', () => { state.answers[q.id] = input.value; save(); });
    setTimeout(() => input.focus(), 60);
  }
  ['ct_name','ct_email','ct_phone','ct_time'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', () => {
        const c = state.answers[q.id] || {};
        c.name  = document.getElementById('ct_name').value;
        c.email = document.getElementById('ct_email').value;
        c.phone = document.getElementById('ct_phone').value;
        c.time  = document.getElementById('ct_time').value;
        state.answers[q.id] = c;
        save();
      });
    }
  });
  setTimeout(() => {
    const first = document.getElementById('ct_name') || document.getElementById('input');
    if (first && document.activeElement === document.body) first.focus();
  }, 100);
}

function renderPracticeBody(q) {
  const p = state.practices[q.practiceId] || {};
  const doing = p.doing || '';
  const followupDim = (doing === 'no' || doing === '') ? 'dimmed' : '';
  const followupDim2 = (doing === 'no') ? 'dimmed' : (doing === '' ? 'dimmed' : '');

  const pillRow = (field, opts, cur) => `
    <div class="p-pills">
      ${opts.map(o => {
        const sel = cur === o.v ? 'selected' : '';
        const cls = o.cls || '';
        return `<button type="button" class="p-pill ${cls} ${sel}" data-field="${field}" data-value="${o.v}" onclick="pickPractice('${q.practiceId}','${field}','${o.v}')">${escapeText(o.l)}</button>`;
      }).join('')}
    </div>`;

  return `
    <div class="practice">
      <div class="p-row">
        <div class="p-lbl">Do you do this?</div>
        ${pillRow('doing', DOING_OPTS, doing)}
      </div>
      <div class="p-row ${followupDim2}" data-conditional="1">
        <div class="p-lbl">Who does it?</div>
        ${pillRow('who', WHO_OPTS, p.who || '')}
      </div>
      <div class="p-row ${followupDim2}" data-conditional="1">
        <div class="p-lbl">How's it going?</div>
        ${pillRow('going', GOING_OPTS, p.going || '')}
      </div>
      <div class="p-row ${followupDim2}" data-conditional="1">
        <div class="p-lbl">Hours per week</div>
        ${pillRow('hours', HOURS_OPTS, p.hours || '')}
      </div>
    </div>`;
}

/* ---------- Answer setters ---------- */

function pickSingle(val) {
  const q = QUESTIONS[state.i];
  state.answers[q.id] = val;
  save();
  document.querySelectorAll('.choice').forEach(el => {
    el.classList.toggle('selected', el.dataset.value === val);
  });
  setTimeout(next, 240);
}

function pickMulti(val, max) {
  const q = QUESTIONS[state.i];
  const cur = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
  const idx = cur.indexOf(val);
  if (idx >= 0) cur.splice(idx, 1);
  else {
    if (cur.length >= max) return;
    cur.push(val);
  }
  state.answers[q.id] = cur;
  save();
  document.querySelectorAll('.choice').forEach(el => {
    el.classList.toggle('selected', cur.includes(el.dataset.value));
  });
}

function pickPractice(practiceId, field, val) {
  if (!state.practices) state.practices = {};
  const cur = state.practices[practiceId] || {};
  cur[field] = val;
  if (field === 'doing' && val === 'no') {
    cur.who = ''; cur.going = ''; cur.hours = '';
  }
  state.practices[practiceId] = cur;
  save();

  // Update pills in the current field row
  document.querySelectorAll(`.p-pill[data-field="${field}"]`).forEach(el => {
    el.classList.toggle('selected', el.dataset.value === val);
  });

  // Handle dim/undim
  const rows = document.querySelectorAll('.p-row[data-conditional="1"]');
  const dim = (cur.doing === 'no' || !cur.doing);
  rows.forEach(r => r.classList.toggle('dimmed', dim));

  // Auto-advance when we have enough info
  if (cur.doing === 'no') {
    setTimeout(next, 350);
  } else if (cur.doing && cur.who && cur.going && cur.hours) {
    setTimeout(next, 220);
  }
}

function skipLane(laneId) {
  const laneP = PRACTICES.filter(p => p.lane === laneId);
  laneP.forEach(p => {
    if (!state.practices[p.id] || !state.practices[p.id].doing) {
      state.practices[p.id] = { doing: 'no', who: '', going: '', hours: '' };
    }
  });
  save();
  // Advance to first question outside this lane
  const totalContext = CONTEXT_QS.length;
  let j = state.i + 1;
  while (j < QUESTIONS.length && QUESTIONS[j].type === 'practice' && QUESTIONS[j].laneId === laneId) j++;
  const card = document.getElementById('card');
  card.classList.add('exit');
  setTimeout(() => { state.i = Math.min(j, QUESTIONS.length - 1); save(); render(); }, 200);
}

/* ---------- Navigation ---------- */

function next() {
  const q = QUESTIONS[state.i];
  if (q && q.required && !state.answers[q.id]) {
    const input = document.getElementById('input');
    if (input) { input.focus(); input.style.borderBottomColor = 'var(--red)'; setTimeout(() => input.style.borderBottomColor = '', 900); }
    return;
  }
  const card = document.getElementById('card');
  card.classList.add('exit');
  setTimeout(() => {
    state.i++;
    if (state.i >= QUESTIONS.length) state.i = QUESTIONS.length - 1;
    save();
    render();
  }, 220);
}

function prev() {
  if (state.i <= -1) return;
  const card = document.getElementById('card');
  card.classList.add('exit');
  setTimeout(() => {
    if (state.done) { state.done = false; state.i = QUESTIONS.length - 1; }
    else state.i--;
    save();
    render();
  }, 200);
}

function startOrResume() {
  if (state.i < 0) state.i = 0;
  save();
  render();
}

function finish() {
  const q = QUESTIONS[state.i];
  const c = state.answers[q.id];
  if (!c || !c.email) {
    document.getElementById('ct_email')?.focus();
    return;
  }
  state.done = true;
  save();

  const analysis = buildAnalysis();
  const summary = buildMarkdown(analysis);

  const body = new URLSearchParams({
    'form-name': FORM_NAME,
    'business_name': state.answers.business_name || '',
    'email': c.email || '',
    'contact_name': c.name || '',
    'phone': c.phone || '',
    'ops_map_json': JSON.stringify(analysis.opsMap),
    'answers_json': JSON.stringify({ context: state.answers, practices: state.practices }),
    'summary_md': summary
  });
  fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })
    .then(r => { state.submitted = r.ok; save(); render(); })
    .catch(() => { state.submitted = false; save(); render(); });

  render();
}

/* ---------- Analysis engine ---------- */

const HOURS_WEIGHT = { '<1': 1, '1-3': 2, '3-8': 4, '8-20': 8, '20+': 16 };
const GOING_WEIGHT = { great: 0, fine: 1, struggling: 3, broken: 5 };
const WHO_MULT     = { owner: 2.0, cracks: 3.0, multi: 1.5, employee: 1.2, contractor: 1.0, ai: 0.5 };

function buildAnalysis() {
  const p = state.practices || {};
  const scored = [];
  const opsMap = {}; // by lane
  let totalHours = 0;
  let doingCount = 0;
  let strugglingCount = 0;
  let manualOwnerCount = 0;
  let aiCount = 0;

  LANES.forEach(l => opsMap[l.id] = []);

  PRACTICES.forEach(pr => {
    const rec = p[pr.id];
    if (!rec || !rec.doing || rec.doing === 'no') return;
    doingCount++;
    const hw = HOURS_WEIGHT[rec.hours] || 0;
    const gw = GOING_WEIGHT[rec.going] || 0;
    const wm = WHO_MULT[rec.who] || 1;
    totalHours += hw;
    if (rec.going === 'struggling' || rec.going === 'broken') strugglingCount++;
    if (rec.who === 'owner') manualOwnerCount++;
    if (rec.who === 'ai') aiCount++;

    // Opportunity score: (hours * (going + owner bonus))
    // Higher = higher priority target
    const struggleBoost = 1 + gw * 0.4;
    const score = Math.round((hw * wm * struggleBoost) * 10) / 10;
    scored.push({ practice: pr, rec, score, hw, gw, wm });
    opsMap[pr.lane].push({ practice: pr, rec, score });
  });

  scored.sort((a, b) => b.score - a.score);

  // Lane rollups
  const laneStats = LANES.map(l => {
    const items = opsMap[l.id];
    const doing = items.length;
    const total = PRACTICES.filter(x => x.lane === l.id).length;
    const struggling = items.filter(x => x.rec.going === 'struggling' || x.rec.going === 'broken').length;
    const ownerRun   = items.filter(x => x.rec.who === 'owner').length;
    const laneScore  = items.reduce((s, x) => s + x.score, 0);
    return { lane: l, doing, total, struggling, ownerRun, laneScore };
  });

  // Nifty lane recommendations (Marketing / Sales / Content / Ops)
  const niftyTallies = { marketing: 0, sales: 0, content: 0, ops: 0 };
  scored.forEach(s => {
    const nl = NIFTY_LANE_MAP[s.practice.lane];
    if (nl) niftyTallies[nl] += s.score;
  });
  const niftyRanked = Object.entries(niftyTallies).sort((a,b) => b[1] - a[1]);

  // First moves - top 3 practices with a suggested treatment
  const firstMoves = scored.slice(0, 3).map(s => buildMoveSuggestion(s));

  return {
    scored,
    opsMap,
    laneStats,
    niftyTallies,
    niftyRanked,
    firstMoves,
    stats: {
      totalHours,
      doingCount,
      strugglingCount,
      manualOwnerCount,
      aiCount,
      totalPractices: PRACTICES.length
    }
  };
}

function buildMoveSuggestion(s) {
  const { practice, rec } = s;
  const owner = (WHO_OPTS.find(o => o.v === rec.who) || {}).l || rec.who;
  const going = (GOING_OPTS.find(o => o.v === rec.going) || {}).l || rec.going;
  const hours = rec.hours;

  let treatment = '', bullets = [];
  if (rec.who === 'owner' && (rec.going === 'struggling' || rec.going === 'broken')) {
    treatment = "Get it off your plate first.";
    bullets = [
      "You're the bottleneck here - that's the highest-leverage move a founder can make.",
      "Document how you do it once, then hand to Nifty (or an internal person) with a checked-by-you approval loop.",
      "Target: cut your hours here by 70% inside 30 days."
    ];
  } else if (rec.who === 'cracks') {
    treatment = "Assign an owner today, then automate.";
    bullets = [
      "'Falls through the cracks' is the most expensive category - it costs you customers and revenue and you can't even measure it.",
      "Pick a person or system as the single owner this week.",
      "Then wrap it in a routine that fires without human memory."
    ];
  } else if (rec.who === 'ai' && (rec.going === 'struggling' || rec.going === 'broken')) {
    treatment = "You're already using AI - it needs an upgrade, not a replacement.";
    bullets = [
      "The tool exists, the muscle is there. It's the process wrapper that's broken.",
      "Nifty runs a 2-hour audit + tune-up on the existing setup, then trains the human loop around it."
    ];
  } else if (hours === '8-20' || hours === '20+') {
    treatment = "Big time sink - automation ROI is obvious here.";
    bullets = [
      `${hours} hours/week means even a 50% cut buys back real capacity.`,
      "Build it once. Runs itself after that.",
      "Right-sized for Bucket 01 (runs itself) or Bucket 02 (checked by a person)."
    ];
  } else {
    treatment = "Quick win - low risk, high leverage.";
    bullets = [
      `${going} today with ${owner} on it - small automation ships fast.`,
      "Good first ship because it de-risks the bigger bets that follow."
    ];
  }

  return { practice, rec, owner, going, hours, treatment, bullets };
}

  const topNifty = a.niftyRanked[0] && a.niftyRanked[0][1] > 0 ? a.niftyRanked[0][0] : null;
  const laneRecHtml = a.niftyRanked.map(([k, v]) => {

  const submitNote = state.submitted === false
    ? '<div class="saved-note err">Couldn\'t send your report over the wire. Your data is saved locally - export below and email it to joe@getnifty.xyz.</div>'
    : (state.submitted ? `<div class="saved-note">Sent to Joe. If you gave an email (${escapeText(state.answers.contact?.email || '')}), expect a reply within 1 business day.</div>` : '');

  document.getElementById('card').innerHTML = `
    <div class="report">

      <h1>Here's how <em>${escapeText(brand)}</em>'s ops actually run.</h1>
      <p class="lede">You do <strong>${a.stats.doingCount}</strong> of the ${a.stats.totalPractices} practices we asked about. About <strong>${a.stats.totalHours} weighted hours</strong> a week go into them. <strong>${a.stats.strugglingCount}</strong> are struggling or broken. <strong>${a.stats.manualOwnerCount}</strong> still run through you.</p>

        <div class="rkicker">First moves</div>
        <h2>Three concrete recommendations</h2>
        <div class="moves">${movesHtml}</div>

      <div class="rsection">
        <div class="rkicker">Where GetNifty picks up</div>

        <div class="lane-cards">${laneRecHtml || '<p style="color:var(--muted);">No lane recommendations yet.</p>'}</div>
      </div>

      <div class="rsection">
        <div class="rkicker">Ops map</div>
        <h2>Every practice, every owner</h2>
        <p style="color:var(--muted);font-size:14px;margin:0 0 14px;">Full breakdown by lane. Practices you don't do are hidden.</p>
        ${opsHtml || '<p style="color:var(--muted);">Nothing captured yet.</p>'}
      </div>

      <div class="result-cta">
        <div class="kicker">Ready to make it real?</div>
        <h3>Book 30 min with Joe. We'll walk your top 3 moves and quote what it takes to run them.</h3>
        <p>No slide deck. No pressure. If it's not a fit, we'll tell you.</p>
        <div class="row">
          <a class="btn" href="mailto:joe@getnifty.xyz?subject=Nifty%20Scope%20Deep%20report%20-%20${encodeURIComponent(brand)}&body=${encodeURIComponent('Hi Joe, I finished the deep audit. Top move is: ' + (a.firstMoves[0] ? a.firstMoves[0].practice.title : 'TBD') + '. Lets book a call.')}">Email Joe &rarr;</a>
          <a class="btn ghost" href="https://getnifty.xyz" target="_blank" rel="noopener">See GetNifty</a>

      </div>
      ${submitNote}
      <div class="result-actions">

        <button onclick="downloadMarkdown()">Download Markdown</button>
        <button onclick="window.print()">Print</button>
        <button onclick="resetAll()">Start over</button>

  updateProgress();
}

function niftyLaneHeadline(k, v) {
  if (k === 'marketing') return v > 20 ? 'Big marketing opportunity' : 'Some marketing lift available';
  if (k === 'sales')     return v > 20 ? 'Sales lane is the crown jewel' : 'Sales lift available';
  if (k === 'content')   return v > 20 ? 'Content engine needs muscle' : 'Some content wins';
  if (k === 'ops')       return v > 20 ? 'Ops is where the pain lives' : 'Some ops cleanup';
  return 'Opportunity';
}

/* ---------- Exports ---------- */

function buildMarkdown(a) {
  const brand = state.answers.business_name || 'Your business';
  const lines = [];
  lines.push(`# Nifty Scope Deep - ${brand}`);
  lines.push('');
  lines.push(`_Generated ${new Date().toLocaleString()}_`);
  lines.push('');
  lines.push('## Snapshot');
  lines.push(`- Practices you do: **${a.stats.doingCount}/${a.stats.totalPractices}**`);
  lines.push(`- Weighted hours/week: **~${a.stats.totalHours}**`);
  lines.push(`- Struggling or broken: **${a.stats.strugglingCount}**`);
  lines.push(`- Owner-run (you): **${a.stats.manualOwnerCount}**`);
  lines.push(`- AI-run already: **${a.stats.aiCount}**`);
  lines.push('');
  lines.push('## Top 10 stack rank');
  a.scored.slice(0, 10).forEach((s, i) => {
    const who = (WHO_OPTS.find(o => o.v === s.rec.who) || {}).l || '';
    const going = (GOING_OPTS.find(o => o.v === s.rec.going) || {}).l || '';
    lines.push(`${i+1}. **${s.practice.title}** - ${who}, ${going}, ${s.rec.hours || '?'} hrs/wk (score ${s.score})`);
  });
  lines.push('');
  lines.push('## First 3 moves');
  a.firstMoves.forEach((m, i) => {
    lines.push(`### Move ${i+1}: ${m.practice.title}`);
    lines.push(`_${m.treatment}_`);
    m.bullets.forEach(b => lines.push(`- ${b}`));
    lines.push('');
  });
  lines.push('## Ops map');
  LANES.forEach(l => {
    const items = a.opsMap[l.id];
    if (!items.length) return;
    lines.push(`### ${l.kicker} - ${l.name}`);
    items.sort((x,y) => y.score - x.score).forEach(it => {
      const who = (WHO_OPTS.find(o => o.v === it.rec.who) || {}).l || '';
      const going = (GOING_OPTS.find(o => o.v === it.rec.going) || {}).l || '';
      lines.push(`- **${it.practice.title}** - ${who} / ${going} / ${it.rec.hours || '?'} hrs`);
    });
    lines.push('');
  });
  lines.push('## Context answers');
  CONTEXT_QS.concat(WRAPUP_QS).forEach(q => {
    const v = state.answers[q.id];
    if (v == null || v === '') return;
    let val = v;
    if (typeof v === 'object') val = Object.entries(v).map(([k,x])=>`${k}: ${x}`).join(' | ');
    if (Array.isArray(v)) val = v.join(', ');
    lines.push(`- **${q.title.replace(/<[^>]+>/g,'')}** ${val}`);
  });
  return lines.join('\n');
}

function downloadJSON() {
  const a = buildAnalysis();
  const payload = {
    business: state.answers.business_name || '',
    generatedAt: new Date().toISOString(),
    context: state.answers,
    practices: state.practices,
    analysis: {
      stats: a.stats,
      stackRank: a.scored.map(s => ({ id: s.practice.id, title: s.practice.title, lane: s.practice.lane, score: s.score, ...s.rec })),
      firstMoves: a.firstMoves.map(m => ({ practice: m.practice.id, treatment: m.treatment, bullets: m.bullets })),
      niftyLanes: a.niftyTallies
    }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  download(blob, slug() + '-scope-deep.json');
}
function downloadMarkdown() {
  const md = buildMarkdown(buildAnalysis());
  const blob = new Blob([md], { type: 'text/markdown' });
  download(blob, slug() + '-scope-deep.md');
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
}
function slug() {
  return (state.answers.business_name || 'nifty-scope-deep')
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'') || 'nifty-scope-deep';
}
function resetAll() {
  if (!confirm('Reset your audit? Export first if you want a copy.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { i: -1, answers: {}, practices: {} };
  render();
}

/* ---------- Utils ---------- */

function escapeAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeText(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---------- Keyboard ---------- */

document.addEventListener('keydown', (e) => {
  if (state.done) return;
  if (state.i < 0) {
    if (e.key === 'Enter') { e.preventDefault(); startOrResume(); }
    return;
  }
  const q = QUESTIONS[state.i];
  if (e.key === 'Enter' && !e.shiftKey) {
    if (q.type === 'longtext') return;
    e.preventDefault();
    if (state.i === QUESTIONS.length - 1) finish(); else next();
  } else if (e.key === 'Escape' && q.type !== 'contact') {
    prev();
  } else if (q.type === 'choice') {
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      pickSingle(q.options[idx]);
    }
  } else if (q.type === 'multi') {
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      pickMulti(q.options[idx], q.max || 99);
    }
  }
});

render();
</script>
