[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Brand Hub
[[redirects]]
  from = "/hub"
  to = "/hub.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/hub.html"
  status = 200

# Nifty Scope (four buckets - current)
[[redirects]]
  from = "/scope/start"
  to = "/scope/start.html"
  status = 200

[[redirects]]
  from = "/scope/app"
  to = "/scope/start.html"
  status = 200

# Nifty Scope Classic (service-buckets version - archived)
[[redirects]]
  from = "/scope-classic/start"
  to = "/scope-classic/start.html"
  status = 200

# Nifty Scope Deep (full 50-practice audit)
[[redirects]]
  from = "/scope-deep/start"
  to = "/scope-deep/start.html"
  status = 200

[[redirects]]
  from = "/scope-deep/app"
  to = "/scope-deep/start.html"
  status = 200

[[redirects]]
  from = "/deep"
  to = "/scope-deep/"
  status = 200

[[redirects]]
  from = "/audit"
  to = "/scope-deep/"
  status = 200
